stages:
  - lint
  - format
  - typecheck
  - security
  - test
  - build

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "1"

cache:
  key: "$CI_JOB_NAME"
  paths:
    - .venv/

backend_lint:
  stage: lint
  image: python:3.12
  before_script:
    - python -m pip install --upgrade pip
    - python -m pip install ruff
  script:
    - ruff check .

backend_format:
  stage: format
  image: python:3.12
  before_script:
    - python -m pip install --upgrade pip
    - python -m pip install ruff
  script:
    - ruff format --check .

backend_typecheck:
  stage: typecheck
  image: python:3.12
  before_script:
    - python -m pip install --upgrade pip
    - python -m pip install mypy pytest fastapi uvicorn pydantic python-multipart
  script:
    - mypy .

backend_security:
  stage: security
  image: python:3.12
  before_script:
    - python -m pip install --upgrade pip
    - python -m pip install bandit vulture
  script:
    - bandit -r app
    - vulture app tests

backend_tests:
  stage: test
  image: python:3.12
  before_script:
    - python -m pip install --upgrade pip
    - python -m pip install pytest pytest-cov fastapi uvicorn pydantic python-multipart httpx
  script:
    - pytest --cov=app --cov-report=term-missing --cov-fail-under=80

docker_build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t crop-disease-detection:latest .
